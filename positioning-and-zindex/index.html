<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position and z-index product</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- sticky section -->
    <section class="absolute-position" id="section1">
    <div class="sticky-position">
        <h1>sticky position</h1>
        <p>عنصر بر اساس موقعیت <strong>اسکرول</strong> کاربر قرار می‌گیرد. یک عنصر چسبنده بسته به موقعیت اسکرول جا به جا میشود. این عنصر به صورت نسبی قرار دارد تا زمانی که یک موقعیت افست مشخص در نمای صفحه برسد - سپس در جای خود «چسبیده» می‌شود</p>
    </div>
    </section>
    <!-- image z-index -->
    <section class="image-section">
        <img src="image/absolute-cinema1.jpg" alt="" class="position1" width="200px">
        <img src="image/absolute-cinema2.jpg" alt="" class="position2" width="300px">
        <img src="image/absolute-cinema3.jpg" alt="" class="position3" width="400px">
        <img src="image/absolute-cinema4.jpg" alt="" class="position4" width="500px">
        <img src="image/absolute-cinema5.jpg" alt="" class="position5" width="600px">
    </section>
    <!-- image position hovering -->
    <section class="hover-image">
        <img src="https://picsum.photos/seed/picsum/500/300" alt="" class="card-1" height="300px" width="500px">
        <img src="https://picsum.photos/500/300?grayscale" alt="" class="card-2" height="300px" width="500px">
        <img src="https://picsum.photos/500/300.jpg" alt="" class="card-3" height="300px" width="500px">
    </section>
    <!-- back to the top -->
    <a href="#section1"><button class="fixed-button">Back to the top</button></a>
</body>
</html>
